services:
  - type: web
    name: breathe-esg-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn breathe_esg.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: breathe_esg.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_HOST
        value: db.yerlnshclxxamevomvdw.supabase.co
      - key: DB_PORT
        value: "5432"
      - key: DB_PASSWORD
        sync: false  # Set manually in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathe-esg-frontend.onrender.com"
